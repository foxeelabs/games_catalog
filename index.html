<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Juegos - Indie Bookshelf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Using a slightly rustic serif font for the vintage feel -->
    <link
        href="https://fonts.googleapis.com/css2?family=Eczar:wght@400;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="top-banner-container">
        <img src="src/images/foxeegames.gif" alt="FoxeeGames Banner" class="top-banner">
    </div>

    <header class="shop-header">
        <h1>Jueguines</h1>
        <p class="subtitle">Explora nuestra colección de aventuras analógicas y digitales</p>
    </header>

    <main class="bookshelf-container">
        <!-- The Javascript will populate the shelves here -->
        <div id="bookshelf" class="bookshelf"></div>
    </main>

    <!-- Modal Overlay -->
    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-content textured-paper">
            <button id="close-modal" class="close-btn" aria-label="Cerrar detalles">&times;</button>
            <div class="modal-body">
                <div class="modal-image-container">
                    <!-- Placeholder for the box art in the modal -->
                    <div id="modal-image" class="modal-image textured-box"></div>
                    <div class="modal-actions">
                        <a href="#" id="modal-link" class="vintage-btn">Visitar</a>
                    </div>
                </div>
                <div class="modal-info">
                    <h2 id="modal-title">Título del Juego</h2>
                    <p id="modal-desc" class="description">Descripción del juego va aquí...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
